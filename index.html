<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Risk Scaler</title>
    <style>
        :root { 
            --bg: #010409; 
            --card: #0d1117; 
            --border: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --accent: #2f81f7;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 10px;
            overscroll-behavior: none;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .input-group { 
            background: var(--card); 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        label { 
            display: block; 
            font-size: 10px; 
            color: var(--text-dim); 
            margin-bottom: 6px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        input { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 18px; 
            margin-bottom: 16px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .dashboard { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 16px; 
        }

        .stat-card { 
            background: #000; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            text-align: center;
        }

        .stat-val { display: block; font-size: 22px; font-weight: 800; color: var(--success); }
        .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

        .btn-main { 
            width: 100%; 
            background: var(--accent); 
            border: none; 
            padding: 18px; 
            border-radius: 10px; 
            color: white; 
            font-weight: bold; 
            font-size: 18px; 
            box-shadow: 0 4px 15px rgba(47, 129, 247, 0.3);
            margin-bottom: 10px;
        }

        .btn-clear {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
        }

        button:active { transform: scale(0.97); opacity: 0.8; }

        .plan-header { 
            color: var(--accent); 
            font-size: 13px; 
            font-weight: bold; 
            padding: 20px 0 10px 0;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .table-head {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1.5fr;
            font-size: 10px;
            color: var(--text-dim);
            padding: 8px 0;
            text-transform: uppercase;
        }

        .row { 
            display: grid; 
            grid-template-columns: 1fr 1.2fr 1.5fr; 
            padding: 14px 0; 
            border-bottom: 1px solid #21262d; 
            font-family: 'Roboto Mono', monospace;
            font-size: 15px; 
            align-items: center;
        }

        .val-sl { font-weight: bold; color: #fff; text-align: right; }
        .val-qty { color: var(--text-dim); text-align: center; }

        .deadly { background: rgba(248, 81, 73, 0.15); border-left: 3px solid var(--danger); padding-left: 5px; }
        .deadly .val-sl { color: var(--danger); }
        .tight { color: var(--warning); }
    </style>
</head>
<body>

    <div class="container">
        <div class="input-group">
            <label>Total Risk Amount (₹)</label>
            <input type="number" id="risk" value="47" inputmode="decimal" oninput="updateStats()">
            
            <label>Current ATR</label>
            <input type="number" id="atr" step="0.01" placeholder="Enter ATR" inputmode="decimal" oninput="updateStats()">
            
            <div class="dashboard">
                <div class="stat-card">
                    <span class="stat-val" id="stats15">0 | 0</span>
                    <span class="stat-label">1.5x (Dist|Qty)</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="stats20">0 | 0</span>
                    <span class="stat-label">2.0x (Dist|Qty)</span>
                </div>
            </div>

            <label>Entry Price (Actual Fill)</label>
            <input type="number" id="entry" placeholder="e.g. 300.50" inputmode="decimal">
            
            <button class="btn-main" onclick="generatePlan()">GENERATE PLAN</button>
            <button class="btn-clear" onclick="clearAll()">CLEAR ALL</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        function nseRound(num) {
            return (Math.floor(num * 20) / 20).toFixed(2);
        }

        function updateStats() {
            const risk = parseFloat(document.getElementById('risk').value) || 0;
            const atr = parseFloat(document.getElementById('atr').value) || 0;
            
            if (atr > 0) {
                const d15 = atr * 1.5;
                const q15 = Math.floor(risk / d15);
                document.getElementById('stats15').innerText = `${d15.toFixed(2)} | ${q15}`;

                const d20 = atr * 2.0;
                const q20 = Math.floor(risk / d20);
                document.getElementById('stats20').innerText = `${d20.toFixed(2)} | ${q20}`;
            }
        }

        function clearAll() {
            document.getElementById('risk').value = 47;
            document.getElementById('atr').value = '';
            document.getElementById('entry').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('stats15').innerText = '0 | 0';
            document.getElementById('stats20').innerText = '0 | 0';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function generatePlan() {
            const risk = parseFloat(document.getElementById('risk').value);
            const atr = parseFloat(document.getElementById('atr').value);
            const entry = parseFloat(document.getElementById('entry').value);
            const results = document.getElementById('results');

            if (!entry || !atr) return;

            results.innerHTML = "";
            const profiles = [[1.5, "1.5x ATR Momentum"], [2.0, "2.0x ATR Conservative"]];

            profiles.forEach(([multiplier, title]) => {
                const dist = atr * multiplier;
                const initialQty = Math.floor(risk / dist);
                const addOnQty = Math.floor(initialQty * 0.5);
                
                let html = `<div>
                                <div class="plan-header">${title}</div>
                                <div class="table-head"><span>Trigger</span><span>Size (Total)</span><span style="text-align:right">Global SL</span></div>`;
                
                let currentShares = initialQty;
                let runningProfit = 0;

                html += `<div class="row"><span>START</span><span class="val-qty">${initialQty} sh</span><span class="val-sl">${nseRound(entry + dist)}</span></div>`;

                for (let i = 1; i <= 7; i++) {
                    const trigger = entry - i;
                    runningProfit += (currentShares * 1); 
                    currentShares += addOnQty;
                    
                    const finalSL = nseRound(trigger + ((risk + runningProfit) / currentShares));
                    const slDist = parseFloat(finalSL) - trigger;

                    const rowClass = slDist < 0.65 ? "deadly" : (slDist < 0.9 ? "tight" : "");

                    html += `<div class="row ${rowClass}">
                                <span>₹${trigger.toFixed(0)}</span>
                                <span class="val-qty">+${addOnQty} (${currentShares})</span>
                                <span class="val-sl">${finalSL}</span>
                             </div>`;
                }
                html += `</div>`;
                results.innerHTML += html;
            });
            window.scrollTo({ top: document.getElementById('results').offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
