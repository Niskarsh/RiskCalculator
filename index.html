<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Command Center v5</title>
    <style>
        :root { 
            --bg: #010409; 
            --card: #0d1117; 
            --border: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --accent: #2f81f7;
            --success: #3fb950;
            --danger: #f85149;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text-main); margin: 0; padding: 10px;
            overscroll-behavior: none;
        }

        .container { max-width: 500px; margin: 0 auto; }

        /* TABS UI */
        .tab-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            flex-shrink: 0;
            padding: 10px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-dim);
            cursor: pointer;
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(47, 129, 247, 0.3);
        }

        .add-tab {
            background: #21262d;
            color: var(--accent);
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-weight: 900;
            font-size: 16px;
        }

        /* WORKSPACE */
        .workspace { background: var(--card); padding: 16px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .ws-title { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .del-btn { color: var(--danger); font-size: 10px; font-weight: bold; border: 1px solid var(--danger); padding: 5px 10px; border-radius: 6px; background: transparent; }

        label { display: block; font-size: 9px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1.5px; }

        /* CHANGED TO TEXT INPUTS TO ALLOW DECIMALS WHILE TYPING */
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 8px; font-size: 18px; margin-bottom: 16px; outline: none; font-weight: bold; }
        input:focus { border-color: var(--accent); }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card { background: #000; padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: 800; color: var(--success); }
        .stat-label { font-size: 9px; color: var(--text-dim); margin-top: 4px; }

        .btn-clear { width: 100%; background: transparent; border: 1px solid var(--border); padding: 10px; border-radius: 10px; color: var(--text-dim); font-size: 11px; font-weight: bold; }

        /* TABLES */
        .plan-header { color: var(--accent); font-size: 11px; font-weight: 900; padding: 25px 0 10px 0; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .table-head { display: grid; grid-template-columns: 1fr 1.2fr 1.5fr; font-size: 9px; color: var(--text-dim); padding: 8px 0; text-transform: uppercase; }
        .row { display: grid; grid-template-columns: 1fr 1.2fr 1.5fr; padding: 14px 0; border-bottom: 1px solid #21262d; font-family: monospace; font-size: 14px; align-items: center; }
        .val-sl { font-weight: bold; color: #fff; text-align: right; }
        .val-qty { color: var(--text-dim); text-align: center; }

        .deadly { background: rgba(248, 81, 73, 0.1); border-left: 3px solid var(--danger); padding-left: 8px; }
        .deadly .val-sl { color: var(--danger); }

        .extend-btn {
            width: 100%; border: 2px dashed var(--border); background: transparent;
            color: var(--text-dim); padding: 15px; border-radius: 12px;
            margin: 20px 0 40px 0; font-size: 11px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="tabBar" class="tab-bar"></div>

        <div class="workspace">
            <div class="header-row">
                <span id="wsDisplay" class="ws-title">WORKSPACE 1</span>
                <button class="del-btn" onclick="deleteActiveTab()">Delete Active Tab</button>
            </div>

            <label>Total Risk Amount (₹)</label>
            <input type="text" id="risk" inputmode="decimal" value="47">
            
            <label>Current ATR</label>
            <input type="text" id="atr" inputmode="decimal" placeholder="0.00">
            
            <div class="dashboard">
                <div class="stat-card">
                    <span class="stat-val" id="stats15">0.00 | 0</span>
                    <span class="stat-label">1.5x (Dist|Qty)</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="stats20">0.00 | 0</span>
                    <span class="stat-label">2.0x (Dist|Qty)</span>
                </div>
            </div>

            <label>Entry Price (Actual Fill)</label>
            <input type="text" id="entry" inputmode="decimal" placeholder="0.00">
            
            <button class="btn-clear" onclick="resetActiveTab()">Reset Data</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        let trades = [];
        let activeIdx = 0;

        function init() {
            const saved = localStorage.getItem('scaler_v5_data');
            if (saved) {
                trades = JSON.parse(saved);
            } else {
                trades = [createBlankWorkspace()];
            }
            refreshUI();
        }

        function createBlankWorkspace() {
            return { risk: "47", atr: "", entry: "", extraCount: 0 };
        }

        function saveData() {
            localStorage.setItem('scaler_v5_data', JSON.stringify(trades));
        }

        function nseRound(num) {
            return (Math.floor(Math.round(num * 100) / 5) * 5 / 100).toFixed(2);
        }

        function refreshUI() {
            saveData();
            renderTabs();
            syncInputs();
            generatePlan();
        }

        function renderTabs() {
            const bar = document.getElementById('tabBar');
            bar.innerHTML = '';
            trades.forEach((t, i) => {
                const btn = document.createElement('div');
                btn.className = `tab ${i === activeIdx ? 'active' : ''}`;
                btn.innerText = t.atr ? `ATR: ${t.atr}` : `Trade ${i+1}`;
                btn.onclick = () => { activeIdx = i; refreshUI(); };
                bar.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'add-tab';
            addBtn.innerText = '+';
            addBtn.onclick = () => {
                trades.push(createBlankWorkspace());
                activeIdx = trades.length - 1;
                refreshUI();
            };
            bar.appendChild(addBtn);
        }

        function syncInputs() {
            const t = trades[activeIdx];
            // We only update the value if the user is NOT currently focused on that field
            // This is the "Decimal Fix"
            if (document.activeElement.id !== 'risk') document.getElementById('risk').value = t.risk;
            if (document.activeElement.id !== 'atr') document.getElementById('atr').value = t.atr;
            if (document.activeElement.id !== 'entry') document.getElementById('entry').value = t.entry;
            document.getElementById('wsDisplay').innerText = `Workspace ${activeIdx + 1}`;
        }

        // Handle Input Events
        ['risk', 'atr', 'entry'].forEach(id => {
            document.getElementById(id).oninput = (e) => {
                trades[activeIdx][id] = e.target.value;
                // Generate plan and stats without re-syncing the input values
                generatePlan();
                saveData();
            };
        });

        function deleteActiveTab() {
            if (trades.length === 1) {
                trades[0] = createBlankWorkspace();
            } else {
                trades.splice(activeIdx, 1);
                if (activeIdx >= trades.length) activeIdx = trades.length - 1;
            }
            refreshUI();
        }

        function resetActiveTab() {
            trades[activeIdx] = createBlankWorkspace();
            refreshUI();
        }

        function extendLadder() {
            trades[activeIdx].extraCount++;
            refreshUI();
        }

        function generatePlan() {
            const t = trades[activeIdx];
            const risk = parseFloat(t.risk) || 0;
            const atr = parseFloat(t.atr) || 0;
            const entry = parseFloat(t.entry) || 0;
            const resDiv = document.getElementById('results');

            if (atr > 0) {
                const d15 = atr * 1.5;
                const q15 = Math.floor(risk / d15);
                document.getElementById('stats15').innerText = `${d15.toFixed(2)} | ${q15}`;

                const d20 = atr * 2.0;
                const q20 = Math.floor(risk / d20);
                document.getElementById('stats20').innerText = `${d20.toFixed(2)} | ${q20}`;
            } else {
                document.getElementById('stats15').innerText = '0.00 | 0';
                document.getElementById('stats20').innerText = '0.00 | 0';
            }

            if (!atr || !entry) { resDiv.innerHTML = ''; return; }

            resDiv.innerHTML = "";
            const profiles = [[1.5, "1.5x ATR Momentum"], [2.0, "2.0x ATR Conservative"]];

            profiles.forEach(([multiplier, title]) => {
                const dist = atr * multiplier;
                const initialQty = Math.floor(risk / dist);
                const addOnQty = Math.floor(initialQty * 0.5);
                
                let html = `<div>
                    <div class="plan-header">${title}</div>
                    <div class="table-head"><span>Trigger</span><span>Size (Total)</span><span style="text-align:right">Global SL</span></div>`;
                
                let currentShares = initialQty;
                let runningProfit = 0;

                html += `<div class="row"><span>START</span><span class="val-qty">${initialQty} sh</span><span class="val-sl">${nseRound(entry + dist)}</span></div>`;

                const totalLevels = 7 + t.extraCount;

                for (let i = 1; i <= totalLevels; i++) {
                    const trigger = entry - i; 
                    runningProfit += currentShares; 
                    currentShares += addOnQty;
                    
                    const finalSL = nseRound(trigger + ((risk + runningProfit) / currentShares));
                    const slDist = Math.abs(parseFloat(finalSL) - trigger);
                    const rowClass = slDist < (atr * 0.65) ? "deadly" : "";

                    html += `<div class="row ${rowClass}">
                        <span>₹${trigger.toFixed(2)}</span>
                        <span class="val-qty">+${addOnQty} (${currentShares})</span>
                        <span class="val-sl">${finalSL}</span>
                    </div>`;
                }
                resDiv.innerHTML += html + `</div>`;
            });

            resDiv.innerHTML += `<button class="extend-btn" onclick="extendLadder()">+ EXTEND LADDER (Level ${8 + t.extraCount}+)</button>`;
        }

        init();
    </script>
</body>
</html>
